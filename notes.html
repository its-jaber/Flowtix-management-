<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notes — Flowtix Command Center</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <style>
    .note-editor { display:none; position:fixed; inset:0; z-index:500; background:var(--bg); flex-direction:column; }
    .note-editor.show { display:flex; }
    .editor-toolbar { background:var(--surface); border-bottom:1px solid var(--border); padding:14px 24px; display:flex; align-items:center; gap:12px; }
    .editor-body { flex:1; padding:32px; max-width:800px; margin:0 auto; width:100%; display:flex; flex-direction:column; gap:16px; }
    .editor-title { font-size:24px; font-weight:700; border:none; outline:none; background:transparent; color:var(--text); font-family:inherit; width:100%; }
    .editor-title::placeholder { color:var(--text-light); }
    .editor-content { flex:1; border:none; outline:none; background:transparent; color:var(--text); font-family:inherit; font-size:15px; line-height:1.7; resize:none; min-height:400px; }
    .editor-content::placeholder { color:var(--text-light); }
    .editor-meta { display:flex; align-items:center; gap:16px; flex-wrap:wrap; }
    .tag-input-wrap { display:flex; flex-wrap:wrap; gap:6px; align-items:center; background:var(--bg); border:1px solid var(--border); border-radius:var(--radius-sm); padding:6px 10px; min-width:200px; }
    .tag-input { border:none; outline:none; background:transparent; font-size:13px; font-family:inherit; color:var(--text); min-width:80px; }
    .tag-chip-removable { background:var(--primary-light); color:var(--primary); font-size:11px; font-weight:600; padding:2px 6px 2px 8px; border-radius:100px; display:flex; align-items:center; gap:4px; }
    .tag-chip-removable button { background:none; border:none; cursor:pointer; color:var(--primary); padding:0; display:flex; align-items:center; }
  </style>
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-mark">
      <div class="logo-icon"><i data-lucide="zap" style="width:18px;height:18px;"></i></div>
      <div><div class="logo-text">Flowtix</div><div class="logo-sub">Command Center</div></div>
    </div>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-section-label">Menu</div>
    <a href="index.html" class="nav-link"><i data-lucide="layout-dashboard" class="nav-icon"></i><span>Dashboard</span></a>
    <a href="clients.html" class="nav-link"><i data-lucide="users" class="nav-icon"></i><span>Clients</span></a>
    <a href="tasks.html" class="nav-link"><i data-lucide="check-square" class="nav-icon"></i><span>Tasks</span></a>
    <a href="notes.html" class="nav-link active"><i data-lucide="file-text" class="nav-icon"></i><span>Notes</span></a>
    <a href="budget.html" class="nav-link"><i data-lucide="wallet" class="nav-icon"></i><span>Budget</span></a>
  </nav>
  <div class="sidebar-footer">Flowtix v1.0</div>
</aside>

<!-- MAIN -->
<div class="main">
  <div class="page-header">
    <div><h1>Notes</h1><div class="header-sub">Capture and organize your thoughts</div></div>
    <div class="header-actions">
      <button class="btn btn-primary" onclick="newNote()"><i data-lucide="plus" style="width:15px;height:15px;"></i> New Note</button>
    </div>
  </div>
  <div class="page-content">
    <div class="toolbar">
      <div class="search-box"><i data-lucide="search" class="search-icon"></i><input class="form-control" type="text" id="searchInput" placeholder="Search notes…" oninput="filterNotes()" /></div>
      <select class="filter-select" id="tagFilter" onchange="filterNotes()"><option value="">All Tags</option></select>
      <select class="filter-select" id="clientFilter" onchange="filterNotes()"><option value="">All Clients</option></select>
      <select class="filter-select" id="pinnedFilter" onchange="filterNotes()">
        <option value="">All Notes</option>
        <option value="1">Pinned Only</option>
      </select>
    </div>
    <div id="notesGrid" class="notes-grid"></div>
  </div>
</div>

<!-- NOTE EDITOR -->
<div class="note-editor" id="noteEditor">
  <div class="editor-toolbar">
    <button class="btn btn-secondary btn-sm" onclick="closeEditor()"><i data-lucide="arrow-left" style="width:14px;height:14px;"></i> Back</button>
    <button class="btn btn-ghost btn-sm" id="pinBtn" onclick="togglePin()"><i data-lucide="pin" style="width:14px;height:14px;"></i> <span id="pinLabel">Pin</span></button>
    <div style="margin-left:auto;display:flex;gap:8px;">
      <button class="btn btn-danger btn-sm" id="deleteNoteBtn" onclick="deleteCurrentNote()" style="display:none;"><i data-lucide="trash-2" style="width:14px;height:14px;"></i> Delete</button>
      <button class="btn btn-primary btn-sm" onclick="saveNote()"><i data-lucide="save" style="width:14px;height:14px;"></i> Save</button>
    </div>
  </div>
  <div class="editor-body">
    <input class="editor-title" type="text" id="eTitle" placeholder="Note title…" />
    <div class="editor-meta">
      <div style="display:flex;align-items:center;gap:8px;">
        <label style="font-size:12.5px;font-weight:600;color:var(--text-muted);">Tags:</label>
        <div class="tag-input-wrap" id="tagInputWrap">
          <input class="tag-input" type="text" id="tagInput" placeholder="Add tag, press Enter…" />
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:8px;">
        <label style="font-size:12.5px;font-weight:600;color:var(--text-muted);">Client:</label>
        <select class="filter-select" id="eClient" style="min-width:160px;"><option value="">No client</option></select>
      </div>
    </div>
    <hr class="divider" />
    <textarea class="editor-content" id="eContent" placeholder="Start writing…"></textarea>
    <input type="hidden" id="eId" />
    <input type="hidden" id="ePinned" value="false" />
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script src="config.js"></script>
<script>
  lucide.createIcons();
  let allNotes = [], allClients = [], editorTags = [];

  async function init() {
    const [notesRes, clientsRes] = await Promise.all([
      supabase.from('notes').select('*, clients(name)').order('pinned', { ascending: false }).order('updated_at', { ascending: false }),
      supabase.from('clients').select('id, name').order('name')
    ]);
    allNotes = notesRes.data || [];
    allClients = clientsRes.data || [];
    populateFilters();
    filterNotes();
  }

  function populateFilters() {
    const opts = allClients.map(c => `<option value="${c.id}">${escHtml(c.name)}</option>`).join('');
    document.getElementById('clientFilter').innerHTML = '<option value="">All Clients</option>' + opts;
    document.getElementById('eClient').innerHTML = '<option value="">No client</option>' + opts;
    const tagSet = new Set();
    allNotes.forEach(n => (n.tags||[]).forEach(t => tagSet.add(t)));
    document.getElementById('tagFilter').innerHTML = '<option value="">All Tags</option>' + [...tagSet].sort().map(t => `<option value="${t}">${escHtml(t)}</option>`).join('');
  }

  function filterNotes() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    const tag = document.getElementById('tagFilter').value;
    const clientId = document.getElementById('clientFilter').value;
    const pinned = document.getElementById('pinnedFilter').value;
    const filtered = allNotes.filter(n => {
      const matchQ = !q || (n.title||'').toLowerCase().includes(q) || (n.content||'').toLowerCase().includes(q);
      const matchT = !tag || (n.tags||[]).includes(tag);
      const matchC = !clientId || n.client_id === clientId;
      const matchP = !pinned || n.pinned;
      return matchQ && matchT && matchC && matchP;
    });
    renderGrid(filtered);
  }

  function renderGrid(notes) {
    const el = document.getElementById('notesGrid');
    if (!notes.length) {
      el.innerHTML = `<div class="empty-state" style="grid-column:1/-1;"><i data-lucide="file-text" class="empty-icon"></i><p>No notes yet. Start writing!</p><button class="btn btn-primary btn-sm" onclick="newNote()">New Note</button></div>`;
      lucide.createIcons(); return;
    }
    el.innerHTML = notes.map(n => `
      <div class="note-card ${n.pinned?'pinned':''}" onclick="openNote('${n.id}')">
        ${n.pinned?`<div class="pin-badge"><i data-lucide="pin" style="width:14px;height:14px;"></i></div>`:''}
        <div class="note-title">${escHtml(n.title||'Untitled')}</div>
        <div class="note-preview">${escHtml(n.content||'')}</div>
        ${(n.tags||[]).length?`<div class="note-tags">${n.tags.map(t=>`<span class="tag-chip">${escHtml(t)}</span>`).join('')}</div>`:''}
        <div class="note-footer"><span>${n.clients?escHtml(n.clients.name):''}</span><span>${fmtDate(n.updated_at)}</span></div>
      </div>
    `).join('');
    lucide.createIcons();
  }

  function newNote() {
    editorTags = [];
    document.getElementById('eId').value = '';
    document.getElementById('eTitle').value = '';
    document.getElementById('eContent').value = '';
    document.getElementById('eClient').value = '';
    document.getElementById('ePinned').value = 'false';
    document.getElementById('pinLabel').textContent = 'Pin';
    document.getElementById('pinBtn').style.color = '';
    document.getElementById('deleteNoteBtn').style.display = 'none';
    renderEditorTags();
    document.getElementById('noteEditor').classList.add('show');
    setTimeout(() => document.getElementById('eTitle').focus(), 100);
  }

  function openNote(id) {
    const note = allNotes.find(n => n.id === id);
    if (!note) return;
    editorTags = [...(note.tags||[])];
    document.getElementById('eId').value = note.id;
    document.getElementById('eTitle').value = note.title||'';
    document.getElementById('eContent').value = note.content||'';
    document.getElementById('eClient').value = note.client_id||'';
    document.getElementById('ePinned').value = String(note.pinned);
    document.getElementById('pinLabel').textContent = note.pinned ? 'Unpin' : 'Pin';
    document.getElementById('pinBtn').style.color = note.pinned ? 'var(--primary)' : '';
    document.getElementById('deleteNoteBtn').style.display = '';
    renderEditorTags();
    document.getElementById('noteEditor').classList.add('show');
    setTimeout(() => document.getElementById('eContent').focus(), 100);
  }

  function closeEditor() { document.getElementById('noteEditor').classList.remove('show'); }

  function togglePin() {
    const current = document.getElementById('ePinned').value === 'true';
    document.getElementById('ePinned').value = String(!current);
    document.getElementById('pinLabel').textContent = !current ? 'Unpin' : 'Pin';
    document.getElementById('pinBtn').style.color = !current ? 'var(--primary)' : '';
  }

  function renderEditorTags() {
    const wrap = document.getElementById('tagInputWrap');
    const input = document.getElementById('tagInput');
    wrap.querySelectorAll('.tag-chip-removable').forEach(el => el.remove());
    editorTags.forEach(tag => {
      const chip = document.createElement('span');
      chip.className = 'tag-chip-removable';
      chip.innerHTML = `${escHtml(tag)} <button onclick="removeTag('${escHtml(tag)}')" type="button"><i data-lucide="x" style="width:10px;height:10px;"></i></button>`;
      wrap.insertBefore(chip, input);
    });
    lucide.createIcons();
  }

  function removeTag(tag) { editorTags = editorTags.filter(t => t !== tag); renderEditorTags(); }

  document.getElementById('tagInput').addEventListener('keydown', e => {
    if (e.key === 'Enter' || e.key === ',') {
      e.preventDefault();
      const val = e.target.value.trim().replace(/,/g,'');
      if (val && !editorTags.includes(val)) { editorTags.push(val); renderEditorTags(); }
      e.target.value = '';
    }
    if (e.key === 'Backspace' && !e.target.value && editorTags.length) { editorTags.pop(); renderEditorTags(); }
  });

  async function saveNote() {
    const id = document.getElementById('eId').value;
    const tagInput = document.getElementById('tagInput').value.trim();
    if (tagInput) { editorTags.push(tagInput); document.getElementById('tagInput').value = ''; }
    const payload = {
      title: document.getElementById('eTitle').value.trim() || 'Untitled',
      content: document.getElementById('eContent').value.trim() || null,
      tags: editorTags.length ? editorTags : null,
      pinned: document.getElementById('ePinned').value === 'true',
      client_id: document.getElementById('eClient').value || null,
      updated_at: new Date().toISOString()
    };
    let error;
    if (id) ({ error } = await supabase.from('notes').update(payload).eq('id', id));
    else ({ error } = await supabase.from('notes').insert(payload));
    if (error) { toast('Save failed: ' + error.message, 'error'); return; }
    toast(id ? 'Note saved!' : 'Note created!', 'success');
    closeEditor();
    await init();
  }

  async function deleteCurrentNote() {
    const id = document.getElementById('eId').value;
    if (!id || !confirm('Delete this note?')) return;
    const { error } = await supabase.from('notes').delete().eq('id', id);
    if (error) { toast('Delete failed: ' + error.message, 'error'); return; }
    toast('Note deleted', 'success');
    closeEditor();
    await init();
  }

  function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function fmtDate(d) { if (!d) return ''; return new Date(d).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}); }
  function toast(msg, type = 'info') {
    const c = document.getElementById('toastContainer');
    const t = document.createElement('div');
    t.className = `toast ${type}`;
    t.innerHTML = `<i data-lucide="${type==='success'?'check-circle':type==='error'?'alert-circle':'info'}" style="width:16px;height:16px;"></i> ${msg}`;
    c.appendChild(t); lucide.createIcons();
    setTimeout(() => { t.classList.add('out'); setTimeout(() => t.remove(), 250); }, 3000);
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape' && document.getElementById('noteEditor').classList.contains('show')) closeEditor();
  });

  checkConnection();
  init();
</script>

</body>
</html>
